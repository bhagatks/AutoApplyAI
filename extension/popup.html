<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Antigravity Apply</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1a1e29;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --brand-color: #ff8000;
      --success-color: #10b981;
      --border-color: rgba(255, 255, 255, 0.08);
    }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      box-sizing: border-box;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }
    .logo {
      background: var(--brand-color);
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .title {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.5px;
    }
    .job-info-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
    }
    .label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }
    .value {
      word-break: break-all;
      color: var(--text-primary);
    }
    .btn {
      background: var(--brand-color);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #ff9500;
    }
    .btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .status-area {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .status-step {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
    }
    .status-step.active {
      color: var(--brand-color);
      font-weight: 500;
    }
    .status-step.success {
      color: var(--success-color);
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .links {
      text-align: center;
      font-size: 11px;
      margin-top: 8px;
    }
    .links a {
      color: var(--brand-color);
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">▲</div>
      <div class="title">Antigravity Apply</div>
    </div>
    
    <div class="job-info-card">
      <span class="label">Current Job Tab</span>
      <span class="value" id="currentUrl">Loading page info...</span>
    </div>

    <button id="runBtn" class="btn" disabled>Tailor & Compile Resume</button>

    <div class="status-area" id="statusArea">
      <div class="status-step" id="step-extract">
        <span class="dot"></span> Extracting job details...
      </div>
      <div class="status-step" id="step-ai">
        <span class="dot"></span> Tailoring resume via Gemini API...
      </div>
      <div class="status-step" id="step-compile">
        <span class="dot"></span> Running Tectonic compilation...
      </div>
      <div class="status-step" id="step-done">
        <span class="dot"></span> Completed! (PDF opened in Finder)
      </div>
    </div>

    <div class="links">
      <a href="http://localhost:3000" target="_blank">Open Agent Dashboard</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
